# Arcana pipeline configuration
# Bar thresholds are auto-calibrated from trade data to target bars_per_day.
# Override any bar's parameters below, or set enabled = false to skip it.

[pipeline]
pair = "ETH-USD"
source = "coinbase"
bars_per_day = 50              # default target for auto-calibrated bars

[database]
host = "localhost"
port = 5432
database = "arcana"
user = "arcana"
password = "arcana"

# Standard bars — auto-calibrated thresholds
[[bars]]
spec = "dollar_auto"

[[bars]]
spec = "tick_auto"

[[bars]]
spec = "volume_auto"

# Time bars — fixed intervals
[[bars]]
spec = "time_5m"
enabled=false

[[bars]]
spec = "time_1h"
enabled=false

# Information-driven bars — EWMA window controls adaptation speed,
# E0 is auto-calibrated from trade data (Prado Ch. 2).
# bars_per_day overcompensates for quadratic random-walk penalty.
# expected_ticks_constraints prevents E[T] collapse/explosion.

# Imbalance bars — bars_per_day=300 to seed lower E[T]
[[bars]]
spec = "tib_20"
bars_per_day = 300
expected_ticks_constraints = [100.0, 5000.0]

[[bars]]
spec = "vib_20"
bars_per_day = 300
expected_ticks_constraints = [100.0, 5000.0]

[[bars]]
spec = "dib_20"
bars_per_day = 300
expected_ticks_constraints = [100.0, 5000.0]

# Run bars — bars_per_day=150 (no cancellation, less overcompensation needed)
[[bars]]
spec = "trb_20"
bars_per_day = 150
expected_ticks_constraints = [100.0, 10000.0]

[[bars]]
spec = "vrb_20"
bars_per_day = 150
expected_ticks_constraints = [100.0, 10000.0]

[[bars]]
spec = "drb_20"
bars_per_day = 150
expected_ticks_constraints = [100.0, 10000.0]

# Examples of customization:
#
# Override bars_per_day for a specific bar type:
# [[bars]]
# spec = "dollar_auto"
# bars_per_day = 100
#
# Override E0 for an info bar instead of auto-calibrating:
# [[bars]]
# spec = "tib_10"
# initial_expected = 500.0
#
# Clamp E[T] to prevent threshold collapse/explosion in balanced markets
# (mlfinlab's exp_num_ticks_constraints). Auto-derived from bars_per_day
# when not set. Override with explicit [min, max]:
# [[bars]]
# spec = "tib_20"
# expected_ticks_constraints = [10.0, 1000.0]
#
# Disable a bar type:
# [[bars]]
# spec = "trb_10"
# enabled = false
#
# Use a fixed threshold instead of auto:
# [[bars]]
# spec = "tick_500"
